name: hourly-ingest

# Manual/on-demand trigger for TrendSite's /api/ingest. GitHub's `schedule:`
# trigger was removed: it's best-effort and was firing only every 6-8 hours
# (or not at all) instead of hourly. Hourly cadence is now driven by an
# external cron pinger (e.g. cron-job.org) hitting /api/ingest directly.
on:
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          curl -fsS -X POST "$INGEST_URL" \
            -H "Authorization: Bearer $INGEST_SECRET" \
            -w "\nHTTP %{http_code}\n"
